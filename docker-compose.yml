
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./.env.docker.example:/app/.env
      - ./src:/app
      - ./models:/app/models
      - ./output:/app/output
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; resp = urllib.request.urlopen(\"http://localhost:8000/health\"); exit(0 if resp.status == 200 else 1)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint: ["uvicorn", "app.main:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-faces}
      POSTGRES_USER: ${POSTGRES_USER:-faces_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faces_pass}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-faces_user}", "-d", "${POSTGRES_DB:-faces}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
